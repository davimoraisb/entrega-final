# ============================================================
#  .github/workflows/ci.yml
#  Pipeline CI para Python + PostgreSQL
#  Salve em: .github/workflows/ci.yml no seu repositório
# ============================================================

name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hidratacao_db

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: hidratacao_db
      DB_USER: postgres
      DB_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Criar banco
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d hidratacao_db -f db_pgadmin.sql

      - name: Executar testes
        run: |
          pytest test.py -v